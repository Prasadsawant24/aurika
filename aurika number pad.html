<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Centered Custom Number Keyboard</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    .keyboard-container {
      text-align: center;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0px;
      width: 50%;
      height: 50%;
      
      
    }

    .number-button {
    width: calc(100% - 10px); /* Adjusted width to include margin */
    height: calc(100% - 10px); /* Adjusted height to include margin */
    margin: 5px; /* Margin from all sides */
    font-size: 18px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
    }
    

    .number-button:hover {
      background-color: #45a049;
    }

    #userInput {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
    }
    
  </style>
</head>
<body>

<input type="text" id="userInput" readonly onclick="toggleKeyboard()" placeholder="Click here to enter a number">

<div class="keyboard-container" id="keyboard" style="display: none;">
  <button class="number-button" onclick="appendToInput('1')">1</button>
  <button class="number-button" onclick="appendToInput('2')">2</button>
  <button class="number-button" onclick="appendToInput('3')">3</button>
  <button class="number-button" onclick="appendToInput('4')">4</button>
  <button class="number-button" onclick="appendToInput('5')">5</button>
  <button class="number-button" onclick="appendToInput('6')">6</button>
  <button class="number-button" onclick="appendToInput('7')">7</button>
  <button class="number-button" onclick="appendToInput('8')">8</button>
  <button class="number-button" onclick="appendToInput('9')">9</button>
  <button class="number-button" onclick="appendToInput('0')">0</button>
  <button class="number-button" onclick="clearInput()">C</button>
  <button class="number-button" onclick="toggleKeyboard()">OK</button>
</div>

<script>
function toggleKeyboard() {
  var keyboard = document.getElementById('keyboard');
  keyboard.style.display = (keyboard.style.display === 'none' || keyboard.style.display === '') ? 'grid' : 'none';
}

function appendToInput(value) {
  document.getElementById("userInput").value += value;
}

function clearInput() {
  document.getElementById("userInput").value = "";
  toggleKeyboard(); // Close the keyboard after clearing input
}
</script>

</body>
</html>
