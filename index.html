<!DOCTYPE html>

<head>
    <title>AURIKA MUMBAI SKYCITY</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header>
        <h1>AURIKA MUMBAI SKYCITY</h1>
    </header>

    <div id="image-container">
        <img src="mumbaiskycity.webp" alt="Aurika Mumbai SkyCity Image" style="width: 100%;">
    </div>

    <div id="auth-buttons">
        <button type="button" onclick="openRegisterForm()">Register</button>
        <button type="button" onclick="openSignInForm()">Sign In</button>
    </div>

    <div id="register-form">
        <span id="close-btn" onclick="closeRegisterForm()">X</span>
        <form onsubmit="createExcel()">
            <label for="register-username">Username:</label>
            <input type="text" id="register-username" name="register-username" required>

            <label for="register-password">Password:</label>
            <input type="password" id="register-password" name="register-password" required>

            <button type="submit">Register</button>
        </form>
    </div>

    <div id="forgot-password-form">
        <span id="close-btn" onclick="closeForgotPasswordForm()">X</span>
        <!-- Forgot password form with recovery email and mobile number -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.3/xlsx.full.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
